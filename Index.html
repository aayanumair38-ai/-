<!DOCTYPE html><html><head><title>🇵🇰 ShopPK - EasyPaisa Only</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#333;min-height:100vh}header{background:#00c851;color:white;padding:20px;text-align:center;box-shadow:0 5px 15px rgba(0,200,81,0.3)}header h1{font-size:2.5em;margin:0}header p{font-size:1.2em;margin:10px 0;background:rgba(255,255,255,0.2);padding:10px;border-radius:25px;display:inline-block}.container{max-width:1200px;margin:0 auto;padding:20px}.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;margin:30px 0}.product{background:white;border-radius:20px;padding:25px;box-shadow:0 15px 35px rgba(0,0,0,0.1);text-align:center;transition:all 0.4s ease;position:relative;overflow:hidden}.product::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);transition:0.5s}.product:hover::before{left:100%}.product:hover{transform:translateY(-15px) scale(1.02);box-shadow:0 25px 50px rgba(0,0,0,0.2)}.product .img-placeholder{width:100%;height:250px;background:linear-gradient(45deg,#f0f0f0,#e0e0e0);border-radius:15px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:1.5em;color:#999;border:3px dashed #ddd}.product h3{font-size:1.6em;color:#333;margin:15px 0;font-weight:600}.price{font-size:2.5em;color:#00c851;font-weight:800;margin:15px 0}.sale-badge{position:absolute;top:20px;right:20px;background:#ff4444;color:white;padding:8px 15px;border-radius:25px;font-weight:bold;font-size:0.9em;animation:pulse 2s infinite}.btn{display:block;width:100%;background:linear-gradient(45deg,#ff6b35,#f7931e);color:white;padding:18px;font-size:1.3em;font-weight:700;border-radius:50px;text-decoration:none;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;margin-top:20px;box-shadow:0 10px 30px rgba(255,107,53,0.4)}.btn:hover{background:linear-gradient(45deg,#e55a2b,#d77f15);transform:translateY(-3px);box-shadow:0 15px 40px rgba(255,107,53,0.6)}#cart{background:white;border-radius:25px;padding:40px;margin:40px auto;max-width:800px;box-shadow:0 20px 60px rgba(0,0,0,0.15);display:none;animation:slideIn 0.5s ease}#cart h2{color:#00c851;font-size:2.5em;text-align:center;margin-bottom:30px}.cart-item{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#f8f9fa;border-radius:15px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}.cart-item span{font-size:1.2em}.cart-total{font-size:3em;color:#00c851;text-align:center;margin:40px 0;font-weight:800}.easypaisa-section{background:linear-gradient(135deg,#00c851,#007e33);color:white;padding:30px;border-radius:20px;margin:30px 0;text-align:center}.easypaisa-section h3{font-size:2em;margin-bottom:20px}.easypaisa-input{width:100%;max-width:400px;padding:20px;font-size:1.2em;border:none;border-radius:15px;margin:15px 0;box-shadow:0 5px 15px rgba(0,0,0,0.2)}.pay-btn{width:100%;background:#ff6b35;color:white;padding:25px;font-size:1.8em;border:none;border-radius:25px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;margin-top:20px;box-shadow:0 15px 40px rgba(255,107,53,0.4)}.pay-btn:hover{background:#e55a2b;transform:translateY(-5px);box-shadow:0 20px 50px rgba(255,107,53,0.6)}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}@keyframes slideIn{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}@media(max-width:768px){.products{grid-template-columns:1fr}.product{padding:20px}}</style></head><body><header><h1>🇵🇰 ShopPK</h1><p>🔥 Clothes | Electronics | Accessories | <strong>EasyPaisa Only</strong> | Free Delivery</p></header><div class="container"><div class="products" id="products"></div><div id="cart"><h2>🛒 Your Cart</h2><div id="cartItems"></div><div class="cart-total" id="total">Total: Rs. 0</div><div class="easypaisa-section"><h3>💰 EasyPaisa Payment</h3><input type="text" class="easypaisa-input" id="easypaisaNum" placeholder="📱 03XX-XXXXXXX"><input type="text" class="easypaisa-input" id="cnic" placeholder="🆔 XXXXX-XXXXXXX-X"><button class="pay-btn" onclick="processPayment()">✅ Pay Now & Confirm Order</button><p style="margin-top:20px;font-size:1.1em;">Instant Confirmation | TCS Delivery 2-3 Days</p></div></div></div><script>const products=[{id:1,name:"Trendy T-Shirt",price:1299,placeholder:"👕 T-Shirt"},{id:2,name:"Slim Fit Jeans",price:3499,placeholder:"👖 Jeans"},{id:3,name:"Sports Sneakers",price:5999,placeholder:"👟 Sneakers"},{id:4,name:"Wireless Earbuds",price:2499,placeholder:"🎧 Earbuds"},{id:5,name:"Smart Watch",price:6999,placeholder:"⌚ Smartwatch"},{id:6,name:"Leather Wallet",price:1899,placeholder:"💼 Wallet"},{id:7,name:"Backpack",price:2999,placeholder:"🎒 Backpack"},{id:8,name:"Hoodie",price:2799,placeholder:"🧥 Hoodie"},{id:9,name:"Sunglasses",price:1599,placeholder:"🕶️ Sunglasses"},{id:10,name:"Cap",price:899,placeholder:"🧢 Cap"}];let cart=[];function renderProducts(){document.getElementById('products').innerHTML=products.map(p=>`<div class="product"><div class="img-placeholder">📦 ${p.placeholder}<br>Put Your Image Here</div><h3>${p.name}</h3><div class="price">Rs. ${p.price.toLocaleString()}</div><button class="btn" onclick="addToCart(${p.id})">🛒 Add to Cart</button></div>`).join('')}function addToCart(id){const product=products.find(p=>p.id===id);const cartItem=cart.find(item=>item.id===id);if(cartItem){cartItem.quantity++}else{cart.push({...product,quantity:1})}updateCart();document.getElementById('cart').scrollIntoView({behavior:'smooth'})}function updateCart(){const cartEl=document.getElementById('cartItems');cartEl.innerHTML=cart.map(item=>`<div class="cart-item"><span>${item.name} (x${item.quantity})</span><span>Rs. ${(item.price*item.quantity).toLocaleString()}</span></div>`).join('');const total=cart.reduce((sum,item)=>sum+(item.price*item.quantity),0);document.getElementById('total').textContent=`Total: Rs. ${total.toLocaleString()}`;document.getElementById('cart').style.display=cart.length?'block':'none'}function processPayment(){if(cart.length===0){alert('🛒 Cart is empty!');return}const number=document.getElementById('easypaisaNum').value.trim();const cnic=document.getElementById('cnic').value.trim();if(!number||!cnic){alert('❌ Please enter EasyPaisa number & CNIC');return}const total=cart.reduce((sum,item)=>sum+(item.price*item.quantity),0);const transId='EP'+Date.now();alert(`🎉 ORDER CONFIRMED!\n\n✅ Transaction ID: ${transId}\n💰 Amount Paid: Rs. ${total.toLocaleString()}\n📱 EasyPaisa: ${number}\n🆔 CNIC: ${cnic}\n\n🚚 TCS Delivery: 2-3 Days\n📦 Order #${Math.floor(Math.random()*10000)}\n\nThank you for shopping! 🇵🇰`);cart=[];document.getElementById('easypaisaNum').value='';document.getElementById('cnic').value='';updateCart()}renderProducts();</script></body></html>
